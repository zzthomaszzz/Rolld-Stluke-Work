<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Stock Take App</title>
</head>
<body>
    <img width="191" height="110" src="https://rolld.co/nz/wp-content/uploads/sites/3/2021/02/Rolld_Logo-1-e1667986006721.png" class="attachment-full size-full wp-image-41" alt="Roll'd NewZealand Logo">
    <h2>Stock Take</h2>
    <table>
        <tr>
            <th>Item name</th>
            <th>Amount</th>
        </tr>
        <tr>
            <td>Bbq chicken</td>
            <td><input type="number" id="userBbqChicken" value="0"></td>
        </tr>
        <tr>
            <td>Lemongrass chicken</td>
            <td><input type="number" id="userLemongrassChicken" value="0"></td>
        </tr>
        <tr>
            <td>Lemongrass beef</td>
            <td><input type="number" id="userLemongrassBeef" value="0"></td>
        </tr>
        <tr>
            <td>Pork and crackling</td>
            <td><input type="number" id="userPorkNCrackling" value="0"></td>
        </tr>
    </table>
    <button onclick="sendEmail()">order</button>
    

    <!-- This links your separate JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
